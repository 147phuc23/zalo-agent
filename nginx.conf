upstream twenty_server {
  server server:3000;
}

upstream twenty_front {
  server front:3000;
}

server {
  listen 80;

  # API endpoints → twenty server
  location /graphql {
    proxy_pass http://twenty_server;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  location /metadata {
    proxy_pass http://twenty_server;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /rest {
    proxy_pass http://twenty_server;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /api {
    proxy_pass http://twenty_server;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /auth {
    proxy_pass http://twenty_server;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # Frontend static assets
  location / {
    proxy_pass http://twenty_front;
    proxy_http_version 1.1;
    proxy_set_header Host localhost;
    proxy_set_header X-Real-IP $remote_addr;
  }
}
